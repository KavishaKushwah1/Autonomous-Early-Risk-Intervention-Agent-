<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - AI Intervention</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        label { font-weight: bold; margin-top: 10px; display: block; }
        input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2ecc71; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; background-color: #e8f8f5; border-left: 5px solid #27ae60; display: none; }
        
    </style>
</head>
<body>

<div class="container">
    <h2>📚 Enter Academic Data</h2>
    
    <label>Student ID (Number):</label>
    <input type="number" id="student_id" placeholder="e.g. 999">

    <label>Subject:</label>
    <input type="text" id="subject" placeholder="e.g. Math">

    <label>Score (%):</label>
    <input type="number" step="0.1" id="score" placeholder="e.g. 45.5">

    <label>Assessment Type:</label>
    <input type="text" id="assessment_type" placeholder="e.g. Midterm Exam">

    <button onclick="submitData()">Submit Grade & Ask AI</button>

    <div id="result_container" class="result-box">
        <div class="ai-title">🤖 AI Intervention Plan:</div>
        <div id="ai_output">Loading analysis...</div>
    </div>
</div>
<div style="margin-top: 40px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; background-color: #f9f9f9;">
    <h2>🔍 View Student History</h2>
    <label for="searchStudentId"><strong>Enter Student ID:</strong></label><br>
    <input type="number" id="searchStudentId" placeholder="e.g., 100" style="padding: 8px; margin-top: 5px; margin-bottom: 10px; width: 200px;">
    <button onclick="fetchStudentHistory()" style="padding: 8px 15px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">Search History</button>

    <div id="historyResults" style="margin-top: 20px; display: none;">
        <h3>📚 Academic Records</h3>
        <ul id="historyList" style="list-style-type: none; padding-left: 0;"></ul>

        <h3>🎭 Behavioral Records</h3>
        <ul id="behaviorList" style="list-style-type: none; padding-left: 0;"></ul>
    </div>
</div>

<script>
    // ==========================================
    // FUNCTION 1: SUBMIT NEW DATA & GET AI PLAN
    // ==========================================
    async function submitData() {
        const studentId = document.getElementById("student_id").value;
        const subject = document.getElementById("subject").value;
        const score = document.getElementById("score").value;
        const assessmentType = document.getElementById("assessment_type").value;
        
        // --- THE VALIDATION BOUNCER ---
        if (!studentId || !subject || !score || !assessmentType) {
            alert("⚠️ Please fill in all 4 boxes before submitting!");
            return; 
        }

        const resultBox = document.getElementById("result_container");
        const aiOutput = document.getElementById("ai_output");

        // Show loading state
        resultBox.style.display = "block";
        aiOutput.innerText = "🧠 Analyzing data and generating intervention plan...";

        // Send data to the backend
        try {
            const response = await fetch("http://127.0.0.1:8000/api/v1/observe/academic", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    student_id: parseInt(studentId),
                    subject: subject,
                    score: parseFloat(score),
                    assessment_type: assessmentType
                })
            });

            const data = await response.json();
            
            // Display the AI's response on the screen!
            if(data.status === "success") {
                aiOutput.innerText = data.ai_analysis; 
            } else {
                aiOutput.innerText = "Error saving data. Check terminal.";
            }
        } catch (error) {
            aiOutput.innerText = "Failed to connect to the backend. Is the FastAPI server running?";
        }
    }

// ==========================================
    // FUNCTION 2: SEARCH PAST STUDENT HISTORY
    // ==========================================
    async function fetchStudentHistory() {
        const studentId = document.getElementById("searchStudentId").value;
        const historyResultsDiv = document.getElementById("historyResults");
        const historyList = document.getElementById("historyList");
        const behaviorList = document.getElementById("behaviorList"); // NEW!

        if (!studentId) {
            alert("Please enter a Student ID to search.");
            return;
        }

        // Clear old results and show loading text
        historyList.innerHTML = "<li>Loading academic data...</li>";
        behaviorList.innerHTML = "<li>Loading behavioral data...</li>";
        historyResultsDiv.style.display = "block";

        try {
            const response = await fetch(`http://127.0.0.1:8000/api/v1/students/${studentId}`);
            const data = await response.json();

            if (response.ok) {
                historyList.innerHTML = ""; 
                behaviorList.innerHTML = ""; 
                
                // --- Display Academic Records ---
                if (data.academic_history.length === 0) {
                    historyList.innerHTML = "<li>No academic records found.</li>";
                } else {
                    data.academic_history.forEach(record => {
                        const li = document.createElement("li");
                        li.style.background = "#fff";
                        li.style.margin = "5px 0";
                        li.style.padding = "10px";
                        li.style.border = "1px solid #ddd";
                        li.style.borderRadius = "4px";
                        li.innerHTML = `<strong>${record.subject}</strong> (${record.assessment_type}): Score <strong>${record.score}%</strong>`;
                        historyList.appendChild(li);
                    });
                }

                // --- Display Behavioral Records ---
                if (data.behavioral_history.length === 0) {
                    behaviorList.innerHTML = "<li>No behavioral records found.</li>";
                } else {
                    data.behavioral_history.forEach(record => {
                        const li = document.createElement("li");
                        li.style.background = "#fff";
                        li.style.margin = "5px 0";
                        li.style.padding = "10px";
                        li.style.border = "1px solid #ddd";
                        li.style.borderRadius = "4px";
                        li.innerHTML = `<strong>${record.activity_type}</strong> - Engagement Score: <strong>${record.engagement_score}/10</strong><br><span style="color: #555; font-size: 0.9em;">Notes: ${record.self_reflection_notes}</span>`;
                        behaviorList.appendChild(li);
                    });
                }

            } else {
                historyList.innerHTML = `<li style="color: red;">${data.detail || data.message}</li>`;
                behaviorList.innerHTML = "";
            }
        } catch (error) {
            console.error("Error fetching history:", error);
            historyList.innerHTML = `<li style="color: red;">Error connecting to the server. Is your backend running?</li>`;
            behaviorList.innerHTML = "";
        }
    }
</script>
</body>
</html>
